<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Face -->
  <circle cx="64" cy="64" r="56" fill="#FFD93D" stroke="#E6A800" stroke-width="3"/>

  <!-- Smile -->
  <path d="M 42 84 Q 64 98 86 84" fill="none" stroke="#5C3A1E" stroke-width="5" stroke-linecap="round"/>

  <!-- Left lens (red - expected/removed) -->
  <rect x="22" y="42" width="36" height="24" rx="6" ry="6" fill="#E53935" opacity="0.85"/>
  <rect x="22" y="42" width="36" height="24" rx="6" ry="6" fill="none" stroke="#333" stroke-width="3"/>

  <!-- Right lens (green - actual/added) -->
  <rect x="70" y="42" width="36" height="24" rx="6" ry="6" fill="#43A047" opacity="0.85"/>
  <rect x="70" y="42" width="36" height="24" rx="6" ry="6" fill="none" stroke="#333" stroke-width="3"/>

  <!-- Bridge -->
  <path d="M 58 54 Q 64 51 70 54" fill="none" stroke="#333" stroke-width="3"/>

  <!-- Left temple -->
  <line x1="22" y1="52" x2="10" y2="46" stroke="#333" stroke-width="3" stroke-linecap="round"/>

  <!-- Right temple -->
  <line x1="106" y1="52" x2="118" y2="46" stroke="#333" stroke-width="3" stroke-linecap="round"/>

  <!-- Minus sign on left lens -->
  <line x1="33" y1="54" x2="47" y2="54" stroke="white" stroke-width="3" stroke-linecap="round"/>

  <!-- Plus sign on right lens -->
  <line x1="81" y1="54" x2="95" y2="54" stroke="white" stroke-width="3" stroke-linecap="round"/>
  <line x1="88" y1="47" x2="88" y2="61" stroke="white" stroke-width="3" stroke-linecap="round"/>
</svg>
